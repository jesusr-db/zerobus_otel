# Databricks Asset Bundle Configuration
# Observability Platform POC - OpenTelemetry Data Pipeline
# Deploy with: databricks bundle deploy -t dev

bundle:
  name: observability-poc
  
# Include resource definitions from separate files
include:
  - resources/*.yml

# Variables for different environments
variables:


  catalog_name:
    description: Unity Catalog name for silver/gold layers
    default: jmr_demo
  
  bronze_catalog:
    description: Bronze layer catalog
    default: jmr_demo
  
  bronze_schema:
    description: Bronze layer schema
    default: zerobus
  
  bronze_table_prefix:
    description: Bronze table prefix
    default: otel
  
  schema_name:
    description: Target schema name for DLT pipelines
    default: zerobus
  
  warehouse_id:
    description: SQL Warehouse ID for queries (optional - only needed for SQL tasks)
    default: "5067b513037fbf07"
  
  alert_webhook_url:
    description: Webhook URL for anomaly alerts (optional)
    default: ""
  
  alert_email:
    description: Email for job notifications (optional)
    default: ""
  
  database_instance_name:
    description: Database Instance name for Synced Tables (required for synced tables setup)
    default: ""

  checkpoint_location: 
    description: Database Instance name for Synced Tables (required for synced tables setup)
    default: "/Volumes/jmr_demo/zerobus/checkpoints/service_health"

# Target environments (dev, staging, prod)
targets:
  dev:
    # mode: development
    default: true
    workspace:
      host: https://fe-vm-vdm-classic-rikfy0.cloud.databricks.com
    variables:
      catalog_name: jmr_demo
      schema_name: zerobus_sdp
      warehouse_id: "5067b513037fbf07"
      database_instance_name: "zerobus-dev"
    
    resources:
      jobs:
        silver_transformations:
          schedule:
            quartz_cron_expression: "0 0/5 * * * ?"
            timezone_id: "UTC"
            pause_status: PAUSED
        
        gold_aggregations:
          schedule:
            quartz_cron_expression: "0 0 */6 * * ?"
            timezone_id: "UTC"
            pause_status: PAUSED
        
        anomaly_alerting:
          schedule:
            quartz_cron_expression: "0 * * * * ?"
            timezone_id: "UTC"
            pause_status: PAUSED
        
        data_quality_validation:
          schedule:
            quartz_cron_expression: "0 0 2 * * ?"
            timezone_id: "UTC"
            pause_status: PAUSED

        gold_pipeline_with_lakebase_sync:
          schedule:
            quartz_cron_expression: "0 0 * * * ?"  # Every hour
            timezone_id: "UTC"
            pause_status: UNPAUSED

      pipelines:
        silver_streaming_pipeline:
          development: true
          continuous: false
        gold_aggregations_pipeline:
          development: true
  
  staging:
    mode: development

    variables:
      catalog_name: jmr_demo
      schema_name: zerobus_stg

  dogfood:
    mode: development

    workspace:
      host: https://e2-dogfood.staging.cloud.databricks.com

    variables:
      bronze_catalog: andre
      bronze_schema: otel
      bronze_table_prefix: otel
      catalog_name: main
      schema_name: dev_jesus_rodriguez_jmr_demo
      warehouse_id: "dd43ee29fedd958d"
      database_instance_name: "zerobus-otel"

    resources:
      jobs:
        silver_transformations:
          schedule:
            quartz_cron_expression: "0 0/5 * * * ?"
            timezone_id: "UTC"
            pause_status: PAUSED

        gold_aggregations:
          schedule:
            quartz_cron_expression: "0 0 */6 * * ?"
            timezone_id: "UTC"
            pause_status: PAUSED

        anomaly_alerting:
          schedule:
            quartz_cron_expression: "0 * * * * ?"
            timezone_id: "UTC"
            pause_status: PAUSED

        data_quality_validation:
          schedule:
            quartz_cron_expression: "0 0 2 * * ?"
            timezone_id: "UTC"
            pause_status: PAUSED

      pipelines:
        silver_streaming_pipeline:
          development: true
          continuous: true
        gold_aggregations_pipeline:
          development: true

  prod:
    mode: production
    
    workspace:
      root_path: /Workspace/Users/jesus.rodriguez@databricks.com/.bundle/${bundle.name}/${bundle.target}
    
    variables:
      catalog_name: jmr_demo
      schema_name: zerobus_prd

# Permissions
permissions:
  - level: CAN_MANAGE
    user_name: jesus.rodriguez@databricks.com
