# Databricks Jobs for Observability Pipeline
# All jobs use serverless compute for cost optimization and faster startup

resources:
  jobs:
    # =======================================================================
    # SILVER TRANSFORMATIONS (Scheduled every 5 minutes)
    # Reads from streaming bronze tables: otel_spans, otel_metrics, otel_logs
    # =======================================================================
    silver_transformations:
      name: "[${bundle.target}] Silver Transformations"
      
      tasks:
        - task_key: flatten_traces
          existing_cluster_id: "0819-204509-hill72"
          notebook_task:
            notebook_path: ../src/notebooks/silver/01_flatten_traces.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              bronze_catalog: ${var.bronze_catalog}
              bronze_schema: ${var.bronze_schema}
              bronze_table_prefix: ${var.bronze_table_prefix}
              checkpoint_location: /checkpoint/silver/traces
        
        - task_key: assemble_traces
          existing_cluster_id: "0819-204509-hill72"
          notebook_task:
            notebook_path: ../src/notebooks/silver/02_assemble_traces.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              checkpoint_location: /checkpoint/silver/traces_assembled
          depends_on:
            - task_key: flatten_traces
        
        - task_key: compute_service_health
          existing_cluster_id: "0819-204509-hill72"
          notebook_task:
            notebook_path: ../src/notebooks/silver/03_compute_service_health.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              checkpoint_location: /checkpoint/silver/service_health
              window_duration: "1 minute"
              watermark_delay: "5 minutes"
          depends_on:
            - task_key: flatten_traces
        
        - task_key: enrich_logs
          existing_cluster_id: "0819-204509-hill72"
          notebook_task:
            notebook_path: ../src/notebooks/silver/04_enrich_logs.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              bronze_catalog: ${var.bronze_catalog}
              bronze_schema: ${var.bronze_schema}
              bronze_table_prefix: ${var.bronze_table_prefix}
              checkpoint_location: /checkpoint/silver/logs
          depends_on:
            - task_key: flatten_traces
        
        - task_key: flatten_metrics
          existing_cluster_id: "0819-204509-hill72"
          notebook_task:
            notebook_path: ../src/notebooks/silver/05_flatten_metrics.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              bronze_catalog: ${var.bronze_catalog}
              bronze_schema: ${var.bronze_schema}
              bronze_table_prefix: ${var.bronze_table_prefix}
              checkpoint_location: /checkpoint/silver/metrics
      
      max_concurrent_runs: 1
      timeout_seconds: 1800
      
      tags:
        environment: ${bundle.target}
        layer: silver
        team: data-engineering
        usecase: otel

    # =======================================================================
    # GOLD AGGREGATIONS (Scheduled hourly)
    # =======================================================================
    gold_aggregations:
      name: "[${bundle.target}] Gold Aggregations"
      
      
      tasks:
        - task_key: service_health_rollups
          notebook_task:
            notebook_path: ../src/notebooks/gold/01_service_health_rollups.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              lookback_hours: "2"
        
        - task_key: service_dependencies
          notebook_task:
            notebook_path: ../src/notebooks/gold/02_service_dependencies.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              lookback_hours: "24"
        
        - task_key: metric_rollups
          notebook_task:
            notebook_path: ../src/notebooks/gold/03_metric_rollups.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              lookback_hours: "2"
        
        - task_key: anomaly_baselines
          notebook_task:
            notebook_path: ../src/notebooks/gold/04_anomaly_baselines.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              lookback_days: "7"
          depends_on:
            - task_key: service_health_rollups
      
      max_concurrent_runs: 1
      timeout_seconds: 3600
      
      tags:
        environment: ${bundle.target}
        layer: gold
        team: data-engineering
        usecase: otel

    # =======================================================================
    # ANOMALY ALERTING (Scheduled every minute)
    # =======================================================================
    anomaly_alerting:
      name: "[${bundle.target}] Anomaly Alerting"
      
      
      tasks:
        - task_key: detect_anomalies
          existing_cluster_id: "0819-204509-hill72"
          notebook_task:
            notebook_path: ../src/notebooks/alerting/detect_anomalies.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              lookback_minutes: "2"
      
      max_concurrent_runs: 1
      timeout_seconds: 300
      
      tags:
        environment: ${bundle.target}
        layer: alerting
        team: sre
        usecase: otel

    # =======================================================================
    # DATA QUALITY VALIDATION (Daily)
    # =======================================================================
    data_quality_validation:
      name: "[${bundle.target}] Data Quality Validation"
      
      
      tasks:
        - task_key: validate_trace_completeness
          notebook_task:
            notebook_path: ../src/notebooks/quality/validate_trace_completeness.py
            base_parameters:
              catalog_name: ${var.catalog_name}
        
        - task_key: validate_cross_signal_correlation
          notebook_task:
            notebook_path: ../src/notebooks/quality/validate_cross_signal_correlation.py
            base_parameters:
              catalog_name: ${var.catalog_name}
        
        - task_key: validate_service_health_metrics
          notebook_task:
            notebook_path: ../src/notebooks/quality/validate_service_health_metrics.py
            base_parameters:
              catalog_name: ${var.catalog_name}
      
      max_concurrent_runs: 1
      timeout_seconds: 1800
      
      tags:
        environment: ${bundle.target}
        layer: quality
        team: data-engineering
        usecase: otel

    # =======================================================================
    # TABLE MAINTENANCE (Weekly) - DISABLED IN DEV
    # =======================================================================
    # Removed to eliminate warehouse_id requirement during testing
    # Uncomment for staging/prod environments with warehouse configured
