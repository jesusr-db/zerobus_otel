# Databricks Jobs for Observability Pipeline
# All jobs use serverless compute for cost optimization and faster startup

resources:
  jobs:
    # =======================================================================
    # PIPELINE SETUP WITH SYNCED TABLES (On-demand)
    # =======================================================================
    pipeline_setup_with_sync:
      name: "[${bundle.target}] Pipeline Setup with Synced Tables"
      
      environments:
        - environment_key: synced_tables_env
          spec:
            client: "1"
            dependencies:
              - databricks-sdk>=0.35.0
      
      tasks:
        - task_key: run_streaming_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.otel_streaming_pipeline.id}
            full_refresh: false
        
        - task_key: setup_synced_tables
          environment_key: synced_tables_env
          notebook_task:
            notebook_path: ../scripts/setup_synced_tables.py
            base_parameters:
              database_instance: "${var.database_instance_name}"
              catalog_name: "${var.catalog_name}"
              schema_name: "${var.schema_name}"
      
      max_concurrent_runs: 1
      timeout_seconds: 3600
      
      tags:
        environment: ${bundle.target}
        layer: setup
        team: data-engineering
        usecase: otel

    # =======================================================================
    # SILVER TRANSFORMATIONS (DEPRECATED - Replaced by DLT streaming pipeline)
    # Use silver_transformations_stream pipeline instead
    # =======================================================================
    # Commented out - replaced by continuous DLT pipeline

    # =======================================================================
    # GOLD AGGREGATIONS (Scheduled hourly)
    # =======================================================================
    gold_aggregations:
      name: "[${bundle.target}] Gold Aggregations"
      
      tasks:
        - task_key: service_health_rollups
          notebook_task:
            notebook_path: ../src/notebooks/gold/01_service_health_rollups.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
              lookback_hours: "2"
        
        - task_key: service_dependencies
          notebook_task:
            notebook_path: ../src/notebooks/gold/02_service_dependencies.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
              lookback_hours: "24"
        
        - task_key: metric_rollups
          notebook_task:
            notebook_path: ../src/notebooks/gold/03_metric_rollups.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
              lookback_hours: "2"
        
        - task_key: anomaly_baselines
          notebook_task:
            notebook_path: ../src/notebooks/gold/04_anomaly_baselines.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
              lookback_days: "7"
          depends_on:
            - task_key: service_health_rollups
      
      max_concurrent_runs: 1
      timeout_seconds: 3600
      
      tags:
        environment: ${bundle.target}
        layer: gold
        team: data-engineering
        usecase: otel

    # =======================================================================
    # ANOMALY ALERTING (Scheduled every minute)
    # =======================================================================
    anomaly_alerting:
      name: "[${bundle.target}] Anomaly Alerting"
      
      tasks:
        - task_key: detect_anomalies
          notebook_task:
            notebook_path: ../src/notebooks/alerting/detect_anomalies.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
              lookback_minutes: "2"
      
      max_concurrent_runs: 1
      timeout_seconds: 300
      
      tags:
        environment: ${bundle.target}
        layer: alerting
        team: sre
        usecase: otel

    # =======================================================================
    # DATA QUALITY VALIDATION (Daily)
    # =======================================================================
    data_quality_validation:
      name: "[${bundle.target}] Data Quality Validation"
      
      tasks:
        - task_key: validate_trace_completeness
          notebook_task:
            notebook_path: ../src/notebooks/quality/validate_trace_completeness.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
        
        - task_key: validate_cross_signal_correlation
          notebook_task:
            notebook_path: ../src/notebooks/quality/validate_cross_signal_correlation.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
        
        - task_key: validate_service_health_metrics
          notebook_task:
            notebook_path: ../src/notebooks/quality/validate_service_health_metrics.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
      
      max_concurrent_runs: 1
      timeout_seconds: 1800
      
      tags:
        environment: ${bundle.target}
        layer: quality
        team: data-engineering
        usecase: otel

    # =======================================================================
    # SYNCED TABLES SETUP (On-demand)
    # =======================================================================
    setup_synced_tables:
      name: "[${bundle.target}] Setup Synced Tables"
      
      environments:
        - environment_key: synced_tables_env
          spec:
            client: "1"
            dependencies:
              - databricks-sdk>=0.35.0
      
      tasks:
        - task_key: create_synced_tables
          environment_key: synced_tables_env
          notebook_task:
            notebook_path: ../scripts/setup_synced_tables.py
            base_parameters:
              database_instance: "${var.database_instance_name}"
              catalog_name: "${var.catalog_name}"
              schema_name: "${var.schema_name}"
      
      max_concurrent_runs: 1
      timeout_seconds: 1800
      
      tags:
        environment: ${bundle.target}
        layer: setup
        team: data-engineering
        usecase: otel

    # =======================================================================
    # DESTROY SYNCED TABLES (On-demand)
    # =======================================================================
    destroy_synced_tables:
      name: "[${bundle.target}] Destroy Synced Tables"
      
      environments:
        - environment_key: synced_tables_env
          spec:
            client: "1"
            dependencies:
              - databricks-sdk>=0.35.0
      
      tasks:
        - task_key: destroy_synced_tables
          environment_key: synced_tables_env
          notebook_task:
            notebook_path: ../scripts/destroy_synced_tables.py
            base_parameters:
              database_instance: "${var.database_instance_name}"
              catalog_name: "${var.catalog_name}"
              schema_name: "${var.schema_name}"
      
      max_concurrent_runs: 1
      timeout_seconds: 600
      
      tags:
        environment: ${bundle.target}
        layer: cleanup
        team: data-engineering
        usecase: otel

    # =======================================================================
    # TABLE MAINTENANCE (Weekly) - DISABLED IN DEV
    # =======================================================================
    # Removed to eliminate warehouse_id requirement during testing
    # Uncomment for staging/prod environments with warehouse configured
