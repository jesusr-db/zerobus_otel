# Unity Catalog Schema Resources
# Creates the Bronze/Silver/Gold schema structure
# Note: Bronze tables (otel_spans, otel_metrics, otel_logs) already exist and stream from OTEL gateway

resources:
  schemas:
    bronze_schema:
      name: bronze
      catalog_name: ${var.catalog_name}
      comment: "Raw OTEL data streaming from gateway (otel_spans, otel_metrics, otel_logs)"
      properties:
        data_classification: "raw"
        retention_days: "7"
        source: "otel_gateway_streaming"
    
    silver_schema:
      name: silver
      catalog_name: ${var.catalog_name}
      comment: "Flattened and enriched observability data (traces_silver, service_health_silver, logs_silver, metrics_silver)"
      properties:
        data_classification: "enriched"
        retention_days: "30"
        transformation_layer: "flatten_and_enrich"
    
    gold_schema:
      name: gold
      catalog_name: ${var.catalog_name}
      comment: "Aggregated analytics (service_health_hourly_gold, service_dependencies_gold, metrics_rollups_gold, anomaly_baselines_gold)"
      properties:
        data_classification: "aggregated"
        retention_days: "90"
        transformation_layer: "aggregate_and_analyze"
