# Unity Catalog Schema Resources
# Creates the Bronze/Silver/Gold schema structure
# Note: Bronze tables (otel_spans, otel_metrics, otel_logs) already exist and stream from OTEL gateway

resources:
  schemas:
    main_schema:
      name: ${var.schema_name}
      catalog_name: ${var.catalog_name}
      comment: "All OTEL data layers - bronze (otel_*), silver (*_silver), gold (*_gold), quality (*_quality)"
      properties:
        data_classification: "all_layers"
        retention_days: "90"
        source: "otel_gateway"
